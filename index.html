<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnailStep Mobility CRM</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f7fa;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 24px;
    }

    .country {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .country h2 {
      margin-top: 0;
      color: #01534f;
    }

    .city {
      border-top: 1px solid #e5e7eb;
      padding: 12px 0;
    }

    .city:first-of-type {
      border-top: none;
    }

    .city-name {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .field {
      margin: 3px 0;
    }

    a {
      color: #01534f;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>SnailStep · Mobility Week CRM</h1>
  <div id="list"></div>

  <script>
    const RAW_DATA = {
      "AL": {
        "country_name": "Albania",
        "cities": [
          {
            "name": "Bashkia Elbasan",
            "population": "217.578",
            "website": "https://elbasani.gov.al",
            "department": "Directory of Planning, Economic Development and Transport",
            "contact_name": "Alba Canaj",
            "address": "Rruga Qemal Stafa, Elbasan, 3001",
            "phone": "(++355) 692022717",
            "email": "alba.canaj@elbasani.gov.al"
          },
          {
            "name": "Tirana",
            "population": "520.000",
            "website": "",
            "department": "Promotion and Awareness Unit",
            "contact_name": "Meri Lamce",
            "address": "Pallati Bjorn, Bulevardi Gjergj Fishta 10, Tirane, 1001",
            "phone": "(++355) 694649946",
            "email": ""
          }
        ]
      },
      "AZ": {
        "country_name": "Azerbaijan",
        "cities": [
          {
            "name": "Baku",
            "population": "2.333.600",
            "website": "http://www.ayna.gov.az",
            "department": "State Programs and Projects Coordination",
            "contact_name": "Vusal Abbasov",
            "address": "5, Haji Mammadov str., Baku, AZ1033",
            "phone": "(++994) 12566 52 58",
            "email": "vusal.abbasov@ayna.gov.az"
          }
        ]
      }
    };

    const COUNTRY_FLAGS = {
      AL: "🇦🇱",
      AZ: "🇦🇿"
    };

    const container = document.getElementById("list");

    Object.entries(RAW_DATA).forEach(([code, country]) => {
      const countryBlock = document.createElement("div");
      countryBlock.className = "country";

      const citiesHtml = country.cities.map(city => `
        <div class="city">
          <div class="city-name">${city.name}</div>
          <div class="field"><strong>Population:</strong> ${city.population || "N/A"}</div>
          <div class="field"><strong>Department:</strong> ${city.department || "N/A"}</div>
          <div class="field"><strong>Contact:</strong> ${city.contact_name || "N/A"}</div>
          <div class="field"><strong>Address:</strong> ${city.address || "N/A"}</div>
          <div class="field"><strong>Phone:</strong> ${city.phone || "N/A"}</div>
          <div class="field"><strong>Email:</strong> ${city.email || "N/A"}</div>
          <div class="field"><strong>Website:</strong> ${
            city.website
              ? `<a href="${city.website}" target="_blank">${city.website}</a>`
              : "N/A"
          }</div>
        </div>
      `).join("");

      countryBlock.innerHTML = `
        <h2>${COUNTRY_FLAGS[code] || ""} ${country.country_name}</h2>
        ${citiesHtml}
      `;

      container.appendChild(countryBlock);
    });
  </script>
</body>
</html>
