<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnailStep · Mobility Week CRM</title>
</head>
<body>
  <h1>SnailStep · Mobility Week CRM</h1>
  <p>Directorio visual de ciudades, contactos y departamentos vinculados a movilidad.</p>
  <div id="results">Cargando datos...</div>

  <script>
    fetch("./mobility_data.json")
      .then(r => r.json())
      .then(data => {
        const firstCountry = Object.entries(data)[0];
        if (!firstCountry) {
          document.getElementById("results").textContent = "No hay datos.";
          return;
        }

        const [code, country] = firstCountry;
        document.getElementById("results").innerHTML =
          "<h2>" + code + " - " + country.country_name + "</h2>" +
          "<p>Ciudades: " + country.cities.length + "</p>";
      })
      .catch(err => {
        document.getElementById("results").textContent = "Error cargando datos";
        console.error(err);
      });
  </script>
</body>
</html>
