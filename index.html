<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnailStep · Mobility Week CRM</title>
  <style>
    :root {
      --brand: #01534f;
      --bg: #f4f7f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 40px;
      color: var(--brand);
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
    }

    .toolbar {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    .search {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    .search:focus {
      border-color: var(--brand);
    }

    .summary {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .country-card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    .country-title {
      margin: 0 0 18px;
      color: var(--brand);
      font-size: 28px;
    }

    .cities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .city-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: #fcfcfc;
    }

    .city-name {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .field {
      margin: 6px 0;
      line-height: 1.4;
    }

    .label {
      font-weight: bold;
    }

    a {
      color: var(--brand);
      text-decoration: none;
      word-break: break-word;
    }

    a:hover {
      text-decoration: underline;
    }

    .empty {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 30px;
      }

      .country-title {
        font-size: 24px;
      }

      .city-name {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

<script>
const COUNTRY_FLAGS = {
  AL:"🇦🇱", AZ:"🇦🇿", GE:"🇬🇪", MT:"🇲🇹", CH:"🇨🇭", EC:"🇪🇨", IS:"🇮🇸",
  LV:"🇱🇻", NL:"🇳🇱", MD:"🇲🇩", MX:"🇲🇽", ME:"🇲🇪", IE:"🇮🇪", NO:"🇳🇴",
  PE:"🇵🇪", KS:"🇽🇰", JP:"🇯🇵", BA:"🇧🇦", UA:"🇺🇦", MK:"🇲🇰", CY:"🇨🇾",
  EE:"🇪🇪", BG:"🇧🇬", HR:"🇭🇷", LU:"🇱🇺", RO:"🇷🇴", RS:"🇷🇸", AR:"🇦🇷",
  GB:"🇬🇧", GR:"🇬🇷", CZ:"🇨🇿", FI:"🇫🇮", LT:"🇱🇹", FR:"🇫🇷", PT:"🇵🇹",
  IT:"🇮🇹", ES:"🇪🇸"
};

const results = document.getElementById("results");
const searchInput = document.getElementById("searchInput");
const summaryText = document.getElementById("summaryText");

function cityMatches(city, countryName, code, query) {
  const fullText = [
    code,
    countryName || "",
    city.name || "",
    city.population || "",
    city.website || "",
    city.department || "",
    city.contact_name || "",
    city.address || "",
    city.phone || "",
    city.email || ""
  ].join(" ").toLowerCase();

  return fullText.includes(query.toLowerCase());
}

function renderData(DATA, query = "") {
  results.innerHTML = "";

  let countriesShown = 0;
  let citiesShown = 0;

  Object.entries(DATA).forEach(([code, country]) => {
    if (!country || !Array.isArray(country.cities)) return;

    const filteredCities = country.cities.filter(city =>
      cityMatches(city, country.country_name, code, query)
    );

    if (filteredCities.length === 0) return;

    countriesShown++;
    citiesShown += filteredCities.length;

    const countryCard = document.createElement("section");
    countryCard.className = "country-card";

    const citiesHtml = filteredCities.map(city => `
      <article class="city-card">
        <div class="city-name">${city.name || "N/A"}</div>
        <div class="field"><span class="label">Population:</span> ${city.population || "N/A"}</div>
        <div class="field"><span class="label">Department:</span> ${city.department || "N/A"}</div>
        <div class="field"><span class="label">Contact:</span> ${city.contact_name || "N/A"}</div>
        <div class="field"><span class="label">Address:</span> ${city.address || "N/A"}</div>
        <div class="field"><span class="label">Phone:</span> ${city.phone || "N/A"}</div>
        <div class="field"><span class="label">Email:</span> ${
          city.email ? `<a href="mailto:${city.email}">${city.email}</a>` : "N/A"
        }</div>
        <div class="field"><span class="label">Website:</span> ${
          city.website ? `<a href="${city.website}" target="_blank" rel="noopener noreferrer">${city.website}</a>` : "N/A"
        }</div>
      </article>
    `).join("");

    countryCard.innerHTML = `
      <h2 class="country-title">${COUNTRY_FLAGS[code] || "🌍"} ${country.country_name || code}</h2>
      <div class="cities-grid">${citiesHtml}</div>
    `;

    results.appendChild(countryCard);
  });

  if (citiesShown === 0) {
    results.innerHTML = `<div class="empty">No se han encontrado resultados.</div>`;
  }

  summaryText.textContent = `${countriesShown} país(es) · ${citiesShown} ciudad(es)`;
}

let GLOBAL_DATA = {};

fetch("./mobility_data.json")
  .then(response => {
    if (!response.ok) {
      throw new Error("No se pudo cargar mobility_data.json");
    }
    return response.json();
  })
  .then(data => {
    GLOBAL_DATA = data;
    renderData(GLOBAL_DATA);
  })
  .catch(error => {
    console.error("Error cargando datos:", error);
    results.innerHTML = `<div class="empty">Error cargando datos. Revisa la consola.</div>`;
    summaryText.textContent = "0 país(es) · 0 ciudad(es)";
  });

searchInput.addEventListener("input", (e) => {
  renderData(GLOBAL_DATA, e.target.value.trim());
});
</script>
