<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnailStep · Mobility Week CRM</title>
</head>
<body>
  <h1>SnailStep · Mobility Week CRM</h1>
  <p>Directorio visual de ciudades, contactos y departamentos vinculados a movilidad.</p>
  <div id="results">Cargando datos...</div>

  <script>
   <script>
const results = document.getElementById("results");

fetch("./mobility_data.json")
  .then(r => r.json())
  .then(data => {

    let html = "";

    Object.entries(data).forEach(([code, country]) => {

      html += `<h2>${code} - ${country.country_name}</h2>`;

      country.cities.forEach(city => {
        html += `
          <div style="margin-bottom:15px; padding:10px; border:1px solid #ccc;">
            <strong>${city.name}</strong><br>
            Population: ${city.population || "N/A"}<br>
            Contact: ${city.contact_name || "N/A"}<br>
            Email: ${city.email || "N/A"}<br>
            Website: ${
              city.website
                ? `<a href="${city.website}" target="_blank">${city.website}</a>`
                : "N/A"
            }
          </div>
        `;
      });

    });

    results.innerHTML = html;

  })
  .catch(err => {
    results.textContent = "Error cargando datos";
    console.error(err);
  });
</script>
